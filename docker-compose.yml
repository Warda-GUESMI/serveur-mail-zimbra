version:'2.1'

services:
  mail:
    image: analogic/poste.io
    container_name: zimbra
    restart: unless-stopped
    ports:
      -"25:25"
      -"110:110"
      -"143:143"
      -"443:443"
      -"8443:8443"
    volumes:
      - zimbra-data:/data
    environment:
      -HTTPS=OFF


volumes:
     zimbra-data
